<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR全景 - 本地六面体</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 8px; backdrop-filter: blur(5px); pointer-events: none; z-index: 20; font-size: 14px; }
        #controls { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; z-index: 20; pointer-events: none; }
        button { pointer-events: auto; background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; margin: 0 10px; border-radius: 40px; font-size: 16px; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.2s ease; font-weight: bold; }
        button.active { background: #ff6600; border-color: white; box-shadow: 0 0 10px rgba(255,102,0,0.5); }
        #status { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 20px; color: #0f0; font-size: 12px; font-family: monospace; pointer-events: none; z-index: 20; }
        @media (max-width: 600px) { button { padding: 8px 16px; font-size: 14px; } #info { font-size: 10px; top: 10px; left: 10px; } }
        .instruction { position: absolute; bottom: 80px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.4); padding: 5px; font-size: 12px; pointer-events: none; z-index: 20; }
        #loading { position: absolute; bottom: 50%; left: 20px; right: 20px; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 40px; z-index: 100; font-size: 14px; backdrop-filter: blur(4px); pointer-events: none; transform: translateY(50%); }
    </style>
</head>
<body>
    <div id="info">🌍 VR 全景 | 本地图片</div>
    <div id="status">⏳ 加载全景中...</div>
    <div id="controls">
        <button id="btn-mouse" class="active">🖱️ 鼠标拖拽</button>
        <button id="btn-gyro">📱 启用陀螺仪</button>
    </div>
    <div class="instruction">💡 手机陀螺仪需点击「启用陀螺仪」并允许权限（iOS需两次点击）</div>
    <div id="loading">⏳ 正在加载六张全景图，请稍候...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== 请确认以下图片文件名与您上传的完全一致（包括大小写） ==========
        // 顺序：前、后、左、右、上、下
        const userImages = [
            "pano_f.jpg",   // 前
            "pano_b.jpg",   // 后
            "pano_l.jpg",   // 左
            "pano_r.jpg",   // 右
            "pano_u.jpg",   // 上
            "pano_d.jpg"    // 下
        ];

        // CubeTextureLoader 需要的顺序: right, left, up, down, front, back
        const cubeOrder = [
            userImages[3],  // 右
            userImages[2],  // 左
            userImages[4],  // 上
            userImages[5],  // 下
            userImages[0],  // 前
            userImages[1]   // 后
        ];

        // 初始化场景、相机、渲染器
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const cubeTextureLoader = new THREE.CubeTextureLoader();
        // 重要：因为是同源图片（和HTML在同一个域名下），不需要设置 crossOrigin，否则可能出错
        // cubeTextureLoader.setCrossOrigin('Anonymous');  // 注释掉
        
        const loadingDiv = document.getElementById('loading');
        const statusDiv = document.getElementById('status');
        
        cubeTextureLoader.load(cubeOrder, (texture) => {
            scene.background = texture;
            loadingDiv.style.display = 'none';
            statusDiv.innerHTML = '✅ 全景已加载 | 鼠标模式';
            statusDiv.style.backgroundColor = 'rgba(0,128,0,0.7)';
            console.log('全景加载成功');
        }, undefined, (err) => {
            console.error('全景加载失败:', err);
            loadingDiv.innerHTML = '❌ 图片加载失败<br><br>请检查：<br>1. 图片文件名是否与代码中的一致（大小写敏感）<br>2. 图片是否和 index.html 放在同一目录（根目录）<br>3. 刷新页面重试';
            loadingDiv.style.backgroundColor = 'rgba(255,0,0,0.8)';
            statusDiv.innerHTML = '❌ 加载失败';
            statusDiv.style.backgroundColor = 'rgba(255,0,0,0.7)';
        });
        
        // ==================== 相机控制 ====================
        let pitch = 0, yaw = 0;
        let isDragging = false;
        let lastX = 0, lastY = 0;
        const sensitivity = 0.005;
        let gyroActive = false;
        let initialGamma = null, initialBeta = null;
        
        function updateCamera() {
            const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
            camera.quaternion.setFromEuler(euler);
        }
        
        function onPointerDown(event) {
            if (gyroActive) return;
            isDragging = true;
            const clientX = event.clientX ?? (event.touches?.[0]?.clientX);
            const clientY = event.clientY ?? (event.touches?.[0]?.clientY);
            if (clientX !== undefined) { lastX = clientX; lastY = clientY; }
            document.body.style.cursor = 'grabbing';
        }
        function onPointerMove(event) {
            if (!isDragging || gyroActive) return;
            const clientX = event.clientX ?? (event.touches?.[0]?.clientX);
            const clientY = event.clientY ?? (event.touches?.[0]?.clientY);
            if (clientX === undefined) return;
            const dx = clientX - lastX, dy = clientY - lastY;
            if (dx === 0 && dy === 0) return;
            yaw -= dx * sensitivity;
            pitch -= dy * sensitivity;
            pitch = Math.max(-Math.PI/2+0.01, Math.min(Math.PI/2-0.01, pitch));
            updateCamera();
            lastX = clientX; lastY = clientY;
        }
        function onPointerUp() { isDragging = false; document.body.style.cursor = 'default'; }
        
        renderer.domElement.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
        window.addEventListener('touchmove', onPointerMove, { passive: false });
        window.addEventListener('touchend', onPointerUp);
        
        // 陀螺仪功能
        async function enableGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        gyroActive = true;
                        updateUI(true);
                    } else { alert('需要授权才能使用陀螺仪'); }
                } catch (error) { alert('陀螺仪授权失败'); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                gyroActive = true;
                updateUI(true);
            }
        }
        function disableGyro() {
            window.removeEventListener('deviceorientation', handleOrientation);
            gyroActive = false;
            updateUI(false);
            initialGamma = null; initialBeta = null;
        }
        function updateUI(active) {
            const btnMouse = document.getElementById('btn-mouse');
            const btnGyro = document.getElementById('btn-gyro');
            if (active) {
                btnMouse.classList.remove('active');
                btnGyro.classList.add('active');
                statusDiv.innerHTML = '📳 陀螺仪模式 | 转动手机';
                statusDiv.style.backgroundColor = 'rgba(255,102,0,0.8)';
                pitch = 0; yaw = 0; updateCamera(); initialGamma = null;
            } else {
                btnMouse.classList.add('active');
                btnGyro.classList.remove('active');
                if (scene.background && scene.background.isCubeTexture) {
                    statusDiv.innerHTML = '✅ 全景已加载 | 鼠标模式';
                    statusDiv.style.backgroundColor = 'rgba(0,128,0,0.7)';
                } else {
                    statusDiv.innerHTML = '⚠️ 全景未加载 | 鼠标模式';
                }
            }
        }
        function handleOrientation(event) {
            if (!gyroActive) return;
            let gamma = event.gamma, beta = event.beta;
            if (gamma === null || beta === null) return;
            if (initialGamma === null) { initialGamma = gamma; initialBeta = beta; return; }
            let deltaGamma = gamma - initialGamma, deltaBeta = beta - initialBeta;
            if (deltaGamma > 180) deltaGamma -= 360;
            if (deltaGamma < -180) deltaGamma += 360;
            let targetYaw = (deltaGamma / 90) * Math.PI;
            let targetPitch = (deltaBeta / 90) * (Math.PI / 2);
            targetPitch = Math.max(-Math.PI/2+0.01, Math.min(Math.PI/2-0.01, targetPitch));
            yaw = targetYaw; pitch = targetPitch;
            updateCamera();
        }
        document.getElementById('btn-mouse').addEventListener('click', () => { if (gyroActive) disableGyro(); });
        document.getElementById('btn-gyro').addEventListener('click', async () => { if (gyroActive) disableGyro(); else await enableGyro(); });
        if (!window.DeviceOrientationEvent) {
            document.getElementById('btn-gyro').disabled = true;
            document.getElementById('btn-gyro').style.opacity = '0.5';
            document.getElementById('btn-gyro').title = '当前设备不支持陀螺仪';
        }
        
        function animate() { renderer.render(scene, camera); requestAnimationFrame(animate); }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        
        // 如果检测到协议是 file://，给出友好提示
        if (window.location.protocol === 'file:') {
            const warn = document.createElement('div');
            warn.style.position = 'absolute'; warn.style.bottom = '140px'; warn.style.left = '10px'; warn.style.right = '10px';
            warn.style.backgroundColor = 'rgba(0,0,0,0.8)'; warn.style.color = '#ffaa00'; warn.style.padding = '12px'; warn.style.borderRadius = '12px';
            warn.style.fontSize = '12px'; warn.style.textAlign = 'center'; warn.style.zIndex = '100';
            warn.innerHTML = '⚠️ 检测到您直接双击打开了HTML文件，这会导致无法加载本地图片。<br>请将文件部署到 Web 服务器（如 GitHub Pages）后访问。';
            document.body.appendChild(warn);
        }
    </script>
</body>
</html>
